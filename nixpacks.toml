[phases.setup]
nixPkgs = ["php83", "php83Extensions.pdo", "php83Extensions.mbstring", "php83Extensions.tokenizer", "php83Extensions.xml", "php83Extensions.curl", "php83Extensions.zip", "composer"]

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader"]

[phases.build]
cmds = ["php artisan view:clear", "php artisan route:clear"]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"